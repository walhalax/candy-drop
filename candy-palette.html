<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrapped Candy Palette</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="900" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Candy colors matching game palette
const colors = [
  '#ff3377', // Pink
  '#33ff88', // Green
  '#3388ff', // Blue
  '#ffee00', // Yellow
  '#ff6633', // Orange
  '#8833ff', // Purple
];

function lightenColor(color, percent) {
  const num = parseInt(color.slice(1), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
}

function shadeColor(color, percent) {
  return lightenColor(color, -percent);
}

function drawWrappedCandy(ctx, cx, cy, color, size, rotation = 0) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  ctx.translate(-cx, -cy);

  const padding = 4;
  const candyWidth = size - padding * 2;
  const candyHeight = size - padding * 2;
  const bodyWidth = candyWidth * 0.55;
  const bodyHeight = candyHeight * 0.7;
  const bodyX = cx - bodyWidth / 2;
  const bodyY = cy - bodyHeight / 2;

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.25)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;

  // Body gradient (metallic sheen)
  const bodyGrad = ctx.createRadialGradient(
    cx - bodyWidth * 0.2, cy - bodyHeight * 0.2, 0,
    cx, cy, bodyWidth * 0.8
  );
  bodyGrad.addColorStop(0, lightenColor(color, 60));
  bodyGrad.addColorStop(0.4, color);
  bodyGrad.addColorStop(0.7, shadeColor(color, 15));
  bodyGrad.addColorStop(1, shadeColor(color, 35));
  ctx.fillStyle = bodyGrad;

  // Rounded body
  const radius = bodyHeight * 0.35;
  ctx.beginPath();
  ctx.moveTo(bodyX + radius, bodyY);
  ctx.lineTo(bodyX + bodyWidth - radius, bodyY);
  ctx.quadraticCurveTo(bodyX + bodyWidth, bodyY, bodyX + bodyWidth, bodyY + radius);
  ctx.lineTo(bodyX + bodyWidth, bodyY + bodyHeight - radius);
  ctx.quadraticCurveTo(bodyX + bodyWidth, bodyY + bodyHeight, bodyX + bodyWidth - radius, bodyY + bodyHeight);
  ctx.lineTo(bodyX + radius, bodyY + bodyHeight);
  ctx.quadraticCurveTo(bodyX, bodyY + bodyHeight, bodyX, bodyY + bodyHeight - radius);
  ctx.lineTo(bodyX, bodyY + radius);
  ctx.quadraticCurveTo(bodyX, bodyY, bodyX + radius, bodyY);
  ctx.closePath();
  ctx.fill();

  // Twisted ends
  ctx.shadowBlur = 0;
  const twistLength = candyWidth * 0.3;
  const twistWidth = candyHeight * 0.28;
  const leftTwistX = bodyX - twistLength;

  // Left wrapper
  const leftGrad = ctx.createLinearGradient(leftTwistX, cy - twistWidth, leftTwistX + twistLength, cy);
  leftGrad.addColorStop(0, shadeColor(color, 45));
  leftGrad.addColorStop(0.3, shadeColor(color, 20));
  leftGrad.addColorStop(0.6, lightenColor(color, 25));
  leftGrad.addColorStop(1, color);
  ctx.fillStyle = leftGrad;

  ctx.beginPath();
  ctx.moveTo(bodyX, cy - bodyHeight * 0.28);
  ctx.lineTo(leftTwistX + twistLength * 0.15, cy - twistWidth * 0.9);
  ctx.lineTo(leftTwistX, cy - twistWidth * 0.5);
  ctx.lineTo(leftTwistX, cy + twistWidth * 0.5);
  ctx.lineTo(leftTwistX + twistLength * 0.15, cy + twistWidth * 0.9);
  ctx.lineTo(bodyX, cy + bodyHeight * 0.28);
  ctx.closePath();
  ctx.fill();

  // Left radial lines
  ctx.strokeStyle = shadeColor(color, 30);
  ctx.lineWidth = 0.8;
  for (let i = 0; i < 5; i++) {
    const angle = (i - 2) * 0.15;
    const innerR = bodyHeight * 0.28;
    const outerR = twistWidth * 0.85;
    ctx.beginPath();
    ctx.moveTo(bodyX - 2, cy + Math.sin(angle) * innerR);
    ctx.lineTo(leftTwistX + twistLength * 0.1, cy + Math.sin(angle) * outerR);
    ctx.stroke();
  }

  // Right wrapper
  const rightTwistX = bodyX + bodyWidth;
  const rightGrad = ctx.createLinearGradient(rightTwistX, cy, rightTwistX + twistLength, cy);
  rightGrad.addColorStop(0, color);
  rightGrad.addColorStop(0.4, lightenColor(color, 25));
  rightGrad.addColorStop(0.7, shadeColor(color, 20));
  rightGrad.addColorStop(1, shadeColor(color, 45));
  ctx.fillStyle = rightGrad;

  ctx.beginPath();
  ctx.moveTo(bodyX + bodyWidth, cy - bodyHeight * 0.28);
  ctx.lineTo(rightTwistX + twistLength * 0.85, cy - twistWidth * 0.9);
  ctx.lineTo(rightTwistX + twistLength, cy - twistWidth * 0.5);
  ctx.lineTo(rightTwistX + twistLength, cy + twistWidth * 0.5);
  ctx.lineTo(rightTwistX + twistLength * 0.85, cy + twistWidth * 0.9);
  ctx.lineTo(bodyX + bodyWidth, cy + bodyHeight * 0.28);
  ctx.closePath();
  ctx.fill();

  // Right radial lines
  ctx.strokeStyle = shadeColor(color, 30);
  for (let i = 0; i < 5; i++) {
    const angle = (i - 2) * 0.15;
    const innerR = bodyHeight * 0.28;
    const outerR = twistWidth * 0.85;
    ctx.beginPath();
    ctx.moveTo(bodyX + bodyWidth + 2, cy + Math.sin(angle) * innerR);
    ctx.lineTo(rightTwistX + twistLength * 0.9, cy + Math.sin(angle) * outerR);
    ctx.stroke();
  }

  // Highlight
  const hlGrad = ctx.createRadialGradient(
    cx - bodyWidth * 0.15, cy - bodyHeight * 0.2, 0,
    cx, cy, bodyWidth * 0.5
  );
  hlGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
  hlGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
  hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hlGrad;
  ctx.beginPath();
  ctx.ellipse(cx - bodyWidth * 0.08, cy - bodyHeight * 0.15, bodyWidth * 0.28, bodyHeight * 0.2, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Specular
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(cx + bodyWidth * 0.18, cy - bodyHeight * 0.18, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Background
ctx.fillStyle = '#1a1a2e';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Subtle grid
ctx.strokeStyle = 'rgba(255,255,255,0.03)';
ctx.lineWidth = 1;
for (let x = 0; x < canvas.width; x += 30) {
  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, canvas.height);
  ctx.stroke();
}
for (let y = 0; y < canvas.height; y += 30) {
  ctx.beginPath();
  ctx.moveTo(0, y);
  ctx.lineTo(canvas.width, y);
  ctx.stroke();
}

// Title
ctx.fillStyle = 'rgba(255,255,255,0.9)';
ctx.font = '300 14px Helvetica Neue';
ctx.letterSpacing = '4px';
ctx.fillText('W R A P P E D   C A N D Y   C O N F E C T I O N', 50, 45);

// Subtitle
ctx.fillStyle = 'rgba(255,255,255,0.4)';
ctx.font = '200 10px Helvetica Neue';
ctx.fillText('DESIGN PHILOSOPHY VISUALIZATION', 50, 62);

// Draw 6 candies in a row
const startX = 90;
const startY = 200;
const spacing = 130;
const size = 70;

colors.forEach((color, i) => {
  const cx = startX + i * spacing;
  const cy = startY + (i % 2) * 25;
  const rot = (i - 2.5) * 0.08;
  drawWrappedCandy(ctx, cx, cy, color, size, rot);

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '200 9px Helvetica Neue';
  ctx.textAlign = 'center';
  const names = ['BERRY', 'MINT', 'BLUE', 'LEMON', 'CITRUS', 'GRAPE'];
  ctx.fillText(names[i], cx, cy + size * 0.65 + 15);
});

// Color swatches
ctx.fillStyle = 'rgba(255,255,255,0.3)';
ctx.font = '200 9px Helvetica Neue';
ctx.textAlign = 'left';
ctx.fillText('COLOR PALETTE', 50, 400);

colors.forEach((color, i) => {
  const swatchX = 50 + i * 55;
  const swatchY = 420;

  // Swatch
  ctx.fillStyle = color;
  ctx.fillRect(swatchX, swatchY, 40, 40);

  // Hex
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '200 8px monospace';
  ctx.fillText(color, swatchX, swatchY + 55);
});

// Design notes
ctx.fillStyle = 'rgba(255,255,255,0.25)';
ctx.font = '200 10px Helvetica Neue';
ctx.textAlign = 'left';
const notes = [
  'FORM AS PROMISE — Plump center, tapered twists',
  'DIAGONAL DYNAMISM — Rotation creates forward momentum',
  'SURFACE AS INDULGENCE — Metallic inner luminescence',
  'TWIST AS DETAIL — Radial lines suggest gathered paper',
  'CHROMATIC SATISFACTION — Colors hold flavor memory'
];

notes.forEach((note, i) => {
  ctx.fillText(note, 50, 510 + i * 18);
});

// Bottom line
ctx.strokeStyle = 'rgba(255,255,255,0.1)';
ctx.lineWidth = 1;
ctx.beginPath();
ctx.moveTo(50, 600);
ctx.lineTo(850, 600);
ctx.stroke();

ctx.fillStyle = 'rgba(255,255,255,0.15)';
ctx.font = '200 8px Helvetica Neue';
ctx.fillText('CANDY DROPS — GAME ASSET DOCUMENTATION', 50, 590);
</script>
</body>
</html>
