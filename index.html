<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="manifest.json">

  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <title>[Game]Candy-Drops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* iOS Safe Area Support */
    html, body {
      margin: 0;
      padding: 0;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      /* Prevent pull-to-refresh and rubber-banding */
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #ffd6e7 0%, #ffb6d9 25%, #ffc8dd 50%, #ffe0f0 75%, #ffd6e7 100%);
      background-size: 400% 400%;
      animation: bgShimmer 8s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Nunito', 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo', sans-serif;
      font-weight: 700;
      overflow: hidden;
      position: fixed;
      inset: 0;
    }
    /* Dark mode styles */
    body.dark-mode {
      background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 40%, #2a1a4e 70%, #0a0a1a 100%);
      background-size: 100% 100%;
      position: relative;
    }
    /* Stars background for dark mode */
    body.dark-mode::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent),
        radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 230px 80px, #fff, transparent),
        radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 370px 50px, #fff, transparent),
        radial-gradient(2px 2px at 450px 180px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 520px 90px, #fff, transparent),
        radial-gradient(2px 2px at 600px 130px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 680px 60px, #fff, transparent),
        radial-gradient(2px 2px at 750px 170px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 100px 200px, #fff, transparent),
        radial-gradient(2px 2px at 180px 250px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 260px 220px, #fff, transparent),
        radial-gradient(2px 2px at 340px 280px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 420px 240px, #fff, transparent),
        radial-gradient(2px 2px at 500px 300px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 580px 260px, #fff, transparent),
        radial-gradient(2px 2px at 660px 320px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 740px 290px, #fff, transparent),
        radial-gradient(2px 2px at 50px 350px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 130px 400px, #fff, transparent),
        radial-gradient(2px 2px at 210px 380px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 290px 450px, #fff, transparent),
        radial-gradient(2px 2px at 380px 420px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 460px 480px, #fff, transparent),
        radial-gradient(2px 2px at 550px 440px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 630px 500px, #fff, transparent),
        radial-gradient(2px 2px at 710px 470px, rgba(255,255,255,0.7), transparent);
      background-repeat: repeat;
      background-size: 800px 600px;
      animation: twinkle 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    body.dark-mode #game-container {
      background: rgba(10, 10, 26, 0.7);
      border-color: rgba(100, 100, 150, 0.3);
      position: relative;
      z-index: 1;
    }
    body.dark-mode #ui {
      background: rgba(10, 10, 26, 0.8);
      color: #e0e0ff;
      border-bottom: 1px solid rgba(100, 100, 150, 0.3);
    }
    body.dark-mode #overlay {
      background: radial-gradient(ellipse at center, rgba(20, 20, 50, 0.98) 0%, rgba(10, 10, 26, 1) 100%);
      color: #e0e0ff;
    }
    body.dark-mode #game-area {
      background: rgba(10, 10, 26, 0.9);
      border: 2px solid rgba(100, 100, 150, 0.4);
    }
    body.dark-mode canvas {
      border-color: rgba(100, 100, 200, 0.6);
      box-shadow: 0 0 20px rgba(80, 80, 180, 0.4);
    }
    body.dark-mode #next-container canvas {
      border-color: rgba(100, 100, 200, 0.5);
      box-shadow: 0 0 10px rgba(80, 80, 180, 0.3);
    }
    body.dark-mode #next-container {
      color: #e0e0ff;
      text-shadow:
        0 1px 0 rgba(150, 150, 255, 0.5),
        0 2px 0 rgba(100, 100, 200, 0.4),
        0 3px 6px rgba(80, 80, 180, 0.3);
    }
    body.dark-mode #controls {
      color: #e0e0ff;
      text-shadow: 0 1px 0 rgba(150, 150, 255, 0.5), 0 1px 3px rgba(80, 80, 180, 0.2);
      background: rgba(20, 20, 50, 0.8);
    }
    body.dark-mode #overlay h1 {
      color: #fff;
      text-shadow: 0 0 10px rgba(150, 150, 255, 0.5), 0 0 20px rgba(100, 100, 200, 0.3);
    }
    body.dark-mode .diff-btn {
      background: rgba(30, 30, 60, 0.8);
      border: 1px solid rgba(100, 100, 150, 0.4);
      color: #e0e0ff;
    }
    body.dark-mode .diff-btn:hover, body.dark-mode .diff-btn.selected {
      background: rgba(60, 60, 120, 0.9);
      border-color: rgba(150, 150, 255, 0.6);
      box-shadow: 0 0 15px rgba(100, 100, 200, 0.3);
    }
    body.dark-mode .start-btn {
      background: linear-gradient(135deg, #4a4a8a 0%, #3a3a7a 100%);
      border: 2px solid rgba(100, 100, 200, 0.5);
      color: #fff;
      box-shadow: 0 0 20px rgba(80, 80, 180, 0.4);
    }
    body.dark-mode .start-btn:hover {
      background: linear-gradient(135deg, #5a5a9a 0%, #4a4a8a 100%);
      box-shadow: 0 0 30px rgba(100, 100, 200, 0.6);
    }
    body.dark-mode .restart-btn, body.dark-mode .title-btn {
      background: rgba(60, 60, 100, 0.8);
      border: 1px solid rgba(100, 100, 150, 0.4);
      color: #e0e0ff;
    }
    body.dark-mode .modal-content {
      background: #2a2a3a;
      color: #e0e0ff;
    }
    body.dark-mode .modal-content h2,
    body.dark-mode .modal-content .control-group h3 {
      color: #ff69b4;
    }
    body.dark-mode .modal-content .control-group p {
      color: #c0c0d0;
    }
    body.dark-mode .help-btn {
      background: #3a3a4a;
      border-color: #ff69b4;
      color: #ff69b4;
      box-shadow: 0 4px 15px rgba(100,100,200,0.4);
    }
    body.dark-mode .help-btn:hover {
      background: #4a4a5a;
      transform: scale(1.05);
    }
    body.dark-mode #ranking h3 {
      color: #ff69b4;
    }
    body.dark-mode #ranking {
      background: rgba(30, 30, 50, 0.9);
      border-color: #ff69b4;
      box-shadow: 0 0 20px rgba(100,100,200,0.3), inset 0 0 10px rgba(60,60,100,0.3);
    }
    body.dark-mode #ranking-list {
      color: #c0c0d0;
    }
    body.dark-mode #ranking-list .rank-item {
      border-bottom-color: #4a4a5a;
    }
    body.dark-mode #ranking-list .rank-first {
      color: #ff69b4;
      text-shadow: 0 1px 0 rgba(150,100,200,0.5), 0 2px 0 rgba(100,100,200,0.4);
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #game-area {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }
    #game-area {
      background: rgba(255,245,248,0.95);
      border-radius: 12px;
      padding: 8px;
    }
    canvas {
      display: block;
      border: 3px solid #ff69b4;
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
      /* Crisp rendering on iOS */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }
    #ui {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #333;
      font-size: 18px;
      font-weight: bold;
      padding: 0 4px;
    }
    #score {
      color: #ff1493;
      font-size: 1.5em;
      font-weight: 800;
      font-family: 'Nunito', 'Hiragino Sans', sans-serif;
      letter-spacing: -0.01em;
      text-shadow:
        0 1px 0 #ffb6d9,
        0 2px 0 #ff69b4,
        0 3px 0 #ff1493,
        0 4px 8px rgba(255,20,147,0.4);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: inline-block;
    }
    #score span {
      display: inline-block;
      font-variant-numeric: tabular-nums;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #score span.pop-anim {
      animation: scorePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes scorePop {
      0% { transform: scale(1); }
      40% { transform: scale(1.6); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    #chain {
      color: #ff69b4;
      font-size: 1.5em;
      font-weight: 800;
      font-family: 'Nunito', 'Hiragino Sans', sans-serif;
      letter-spacing: -0.01em;
      text-shadow:
        0 1px 0 #ffb6d9,
        0 2px 0 #ff85c0,
        0 3px 0 #ff1493,
        0 4px 8px rgba(255,105,180,0.4);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: inline-block;
    }
    #chain span {
      display: inline-block;
      font-variant-numeric: tabular-nums;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #chain span.pop-anim {
      animation: chainPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes chainPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.6); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    #next-container {
      position: absolute;
      top: 0;
      left: calc(100% + 10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #ff1493;
      font-size: 14px;
      font-weight: 800;
      font-family: 'Nunito', 'Hiragino Sans', sans-serif;
      text-shadow:
        0 1px 0 #ffb6d9,
        0 2px 0 #ff69b4,
        0 3px 4px rgba(255,20,147,0.3);
      -webkit-font-smoothing: antialiased;
    }
    #next-container canvas {
      border: 2px solid #ff69b4;
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.3);
    }
    #controls {
      width: 100%;
      text-align: center;
      color: #ff1493;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', 'Hiragino Sans', sans-serif;
      text-shadow: 0 1px 0 #ffb6d9, 0 1px 3px rgba(255,20,147,0.2);
      background: rgba(255,255,255,0.8);
      padding: 8px 15px;
      border-radius: 8px;
      margin-top: 4px;
    }
    #controls span { margin: 0 8px; }
    #controls .key {
      background: #ffe0f0;
      border: 1px solid #ff69b4;
      border-radius: 4px;
      padding: 2px 6px;
      font-weight: bold;
      color: #ff1493;
    }
    /* iPad Touch Controls - Bottom Right */
    #touch-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(255, 105, 180, 0.3);
      z-index: 100;
      /* iOS blur effect */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .control-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .touch-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(145deg, #fff0f5, #ffe0ec);
      box-shadow:
        0 2px 8px rgba(255, 105, 180, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      font-size: 24px;
      color: #ff1493;
      cursor: pointer;
      /* iOS touch feedback */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .touch-btn:active {
      transform: scale(0.92);
      background: linear-gradient(145deg, #ffe0ec, #ffd0e0);
      box-shadow:
        0 1px 4px rgba(255, 105, 180, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }
    .drop-btn {
      width: 120px;
      background: linear-gradient(145deg, #ffb6d9, #ff8fcc);
      color: #fff;
      font-size: 20px;
      font-weight: bold;
    }
    .drop-btn:active {
      background: linear-gradient(145deg, #ff8fcc, #ff6bb8);
    }
    /* Hide on desktop - show only on touch devices */
    @media (hover: hover) and (pointer: fine) {
      #touch-controls {
        display: none;
      }
    }
    /* PWA Install Banner */
    #install-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      z-index: 300;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      box-shadow: 0 4px 20px rgba(255, 105, 180, 0.4);
    }
    #install-banner.show {
      transform: translateY(0);
    }
    #install-banner span {
      display: inline-block;
      margin-right: 12px;
      vertical-align: middle;
    }
    #install-banner .install-btn {
      display: inline-block;
      background: #fff;
      color: #ff1493;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      vertical-align: middle;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #install-banner .close-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.3);
      border: none;
      color: #fff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    /* Icon Generator Button */
    #icon-generator-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(60, 60, 100, 0.9);
      color: #e0e0ff;
      border: 1px solid rgba(100, 100, 150, 0.4);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      z-index: 100;
      display: none;
    }
    #icon-generator-btn.show {
      display: block;
    }
    /* Icon Generator Modal */
    #icon-gen-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 400;
      display: none;
      justify-content: center;
      align-items: center;
    }
    #icon-gen-modal.show {
      display: flex;
    }
    #icon-gen-modal .modal-content {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    #icon-gen-modal h3 {
      color: #ff1493;
      margin: 0 0 16px 0;
    }
    #icon-gen-modal canvas {
      border: 2px solid #ff69b4;
      border-radius: 8px;
      max-width: 100%;
    }
    #icon-gen-modal .btn-row {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    #icon-gen-modal button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    #icon-gen-modal .gen-btn {
      background: #ff69b4;
      color: #fff;
    }
    #icon-gen-modal .close-moda-btn {
      background: #eee;
      color: #666;
    }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg,
        rgba(255,182,193,0.85) 0%,
        rgba(255,240,245,0.90) 30%,
        rgba(255,230,240,0.88) 70%,
        rgba(255,200,220,0.85) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #333;
      z-index: 200;
      padding: 20px;
      overflow-y: auto;
    }
    #candy-bg {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      z-index: 199;
      pointer-events: none;
    }
    #overlay.hidden { display: none; }
    #overlay.hidden ~ #candy-bg { z-index: -1; }
    #overlay h1 {
      font-size: 36px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowShift 3s ease infinite;
    }
    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    #overlay p { margin: 8px 0; color: #555; font-size: 14px; }
    #overlay .key {
      background: #ffe0f0;
      border: 1px solid #ff69b4;
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: bold;
      color: #ff1493;
      display: inline-block;
      min-width: 24px;
      text-align: center;
    }
    #overlay .start-hint {
      margin-top: 30px;
      color: #ff1493;
      font-weight: bold;
      font-size: 20px;
      animation: pulse 1.5s infinite;
    }
    .start-btn {
      margin-top: 25px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: 900;
      font-family: 'Nunito', 'Hiragino Sans', sans-serif;
      color: #fff;
      background: linear-gradient(145deg, #ff69b4, #ff1493);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow:
        0 4px 0 #cc1177,
        0 6px 20px rgba(255, 105, 180, 0.5);
      animation: pulse 1.5s infinite;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      min-width: 200px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(255, 105, 180, 0.6);
    }
    .start-btn:active {
      transform: scale(0.98);
    }
    .restart-btn, .title-btn {
      display: none;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(145deg, #ff69b4, #ff1493);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 105, 180, 0.5);
      z-index: 150;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    .restart-btn {
      top: calc(50% + 60px);
    }
    .title-btn {
      top: calc(50% + 130px);
      background: linear-gradient(145deg, #888888, #666666);
    }

  <script>
    // ===== AUDIO SYSTEM =====
    class AudioManager {
      constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.bgmGain = null;
        this.muted = false;
      }

      init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.connect(this.ctx.destination);
        // Separate BGM gain for volume control
        this.bgmGain = this.ctx.createGain();
        this.bgmGain.gain.value = 0.15;
        this.bgmGain.connect(this.masterGain);
        this.loadMuteState();
      }

      getCtx() {
        if (!this.ctx) this.init();
        return this.ctx;
      }

      getMaster() {
        if (!this.masterGain) this.init();
        return this.masterGain;
      }

      getBgmNode() {
        if (!this.bgmGain) this.init();
        return this.bgmGain;
      }

      setMuted(muted) {
        this.muted = muted;
        if (this.masterGain) {
          this.masterGain.gain.value = muted ? 0 : 1;
        }
        // Also update BGM gain based on mute state
        if (this.bgmGain) {
          this.bgmGain.gain.value = muted ? 0 : (paused ? 0 : 0.15);
        }
        localStorage.setItem('candyDrops_muted', muted ? '1' : '0');
      }

      toggleMute() {
        this.setMuted(!this.muted);
      }

      loadMuteState() {
        const saved = localStorage.getItem('candyDrops_muted');
        if (saved === '1') this.setMuted(true);
      }
    }

    const audioManager = new AudioManager();

    // Audio utility functions
    function playTone(freq, type, duration, gain = 0.3, filterFreq = 4000) {
      const ctx = audioManager.getCtx();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      const gainNode = ctx.createGain();
      gainNode.gain.setValueAtTime(gain, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(filterFreq, now);

      osc.connect(filter).connect(gainNode).connect(audioManager.getMaster());
      osc.start(now);
      osc.stop(now + duration);
    }

    function playNotes(notes, type, noteDuration, gap, gain = 0.3, filterFreq = 4000) {
      const ctx = audioManager.getCtx();
      const now = ctx.currentTime;

      notes.forEach((freq, i) => {
        const start = now + i * gap;
        const osc = ctx.createOscillator();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);

        const gainNode = ctx.createGain();
        gainNode.gain.setValueAtTime(gain, start);
        gainNode.gain.exponentialRampToValueAtTime(0.001, start + noteDuration);

        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(filterFreq, start);

        osc.connect(filter).connect(gainNode).connect(audioManager.getMaster());
        osc.start(start);
        osc.stop(start + noteDuration);
      });
    }

    function playNoise(duration, gain = 0.2, lpfFreq = 4000, hpfFreq = 0) {
      const ctx = audioManager.getCtx();
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      const source = ctx.createBufferSource();
      source.buffer = buffer;

      const gainNode = ctx.createGain();
      gainNode.gain.setValueAtTime(gain, now);
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

      const lpf = ctx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(lpfFreq, now);

      let chain = source.connect(lpf).connect(gainNode);

      if (hpfFreq > 0) {
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass';
        hpf.frequency.setValueAtTime(hpfFreq, now);
        source.disconnect();
        chain = source.connect(hpf).connect(lpf).connect(gainNode);
      }

      chain.connect(audioManager.getMaster());
      source.start(now);
      source.stop(now + duration);
    }

    // ===== GAME SFX =====
    // Note: C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00, A4=440.00, B4=493.88, C5=523.25, E5=659.25, B5=987.77

    function moveSfx() {
      playTone(440, 'sine', 0.05, 0.15, 3000);
    }

    function rotateSfx() {
      playTone(523.25, 'square', 0.08, 0.2, 4000);
    }

    function landSfx() {
      playTone(196, 'triangle', 0.15, 0.25, 1500);
    }

    function obstacleLandSfx() {
      playTone(330, 'sine', 0.1, 0.3, 800);
    }

    function chainSfx(level) {
      const chainLevel = Math.min(level, 5);
      const ctx = audioManager.getCtx();
      const now = ctx.currentTime;

      // Base frequency rises with chain level (C5=523 to G5=784)
      const baseFreq = 523.25 + chainLevel * 52;

      // Master gain for this chain
      const masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0.25 + chainLevel * 0.03, now);
      masterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      masterGain.connect(audioManager.getMaster());

      // Rising arpeggio - feel of building up
      const numNotes = 3 + chainLevel;
      for (let i = 0; i < numNotes; i++) {
        const startTime = now + i * 0.05;
        const freq = baseFreq * (1 + i * 0.25); // Rising frequencies

        const osc = ctx.createOscillator();
        osc.type = i % 2 === 0 ? 'square' : 'triangle';
        osc.frequency.setValueAtTime(freq, startTime);

        const g = ctx.createGain();
        g.gain.setValueAtTime(0.15, startTime);
        g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);

        const f = ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.setValueAtTime(2500 + chainLevel * 300, startTime);

        osc.connect(f).connect(g).connect(masterGain);
        osc.start(startTime);
        osc.stop(startTime + 0.2);
      }

      // Final chord hit for chains >= 3
      if (chainLevel >= 3) {
        const chordFreqs = [baseFreq, baseFreq * 1.25, baseFreq * 1.5, baseFreq * 2];
        chordFreqs.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + 0.15 + i * 0.02);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.12, now + 0.15 + i * 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
          osc.connect(g).connect(masterGain);
          osc.start(now + 0.15 + i * 0.02);
          osc.stop(now + 0.5);
        });
      }

      // Sparkle burst for chains >= 4
      if (chainLevel >= 4) {
        for (let i = 0; i < 5; i++) {
          const osc = ctx.createOscillator();
          osc.type = 'square';
          osc.frequency.setValueAtTime(baseFreq * (3 + i * 0.5), now + 0.1 + i * 0.03);
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.05, now + 0.1 + i * 0.03);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          const f = ctx.createBiquadFilter();
          f.type = 'lowpass';
          f.frequency.setValueAtTime(5000, now);
          osc.connect(f).connect(g).connect(masterGain);
          osc.start(now + 0.1 + i * 0.03);
          osc.stop(now + 0.25);
        }
      }
    }

    function gameOverSfx() {
      playNotes([392, 329.63, 261.63, 220, 174.61], 'square', 0.25, 0.12, 0.3, 2500);
    }

    function clickSfx() {
      playTone(523.25, 'sine', 0.06, 0.15, 5000);
    }

    // ===== BGM SYSTEM (pop & bright) =====
    const NOTES = {
      C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00,
      C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
      C5: 523.25, D5: 587.33, E5: 659.25, G5: 783.99, A5: 880.00
    };

    // Parse pattern string to note array
    function parsePattern(str, type = 'square', gain = 0.12, lpf = 3000) {
      return str.split(' ').map(n => {
        if (n === 'R' || n === '~') return { freq: 0 };
        return { freq: NOTES[n] || 0, type, gain, lpf };
      });
    }

    // Multi-phrase melodies for anti-repetition (4 variations = ~11 seconds per cycle)
    const melodies = [
      // Melody 1 - bright ascending
      parsePattern('E5 R D5 R C5 R D5 R E5 R D5 R C5 R D5 R', 'square', 0.08, 3500),
      // Melody 2 - playful
      parsePattern('G5 R A5 R G5 R E5 R D5 R C5 R D5 R E5 R', 'square', 0.08, 3500),
      // Melody 3 - happy bounce
      parsePattern('C5 R D5 R E5 R G5 R E5 R D5 R C5 R D5 R', 'square', 0.08, 3500),
      // Melody 4 - resolution
      parsePattern('E5 R G5 R A5 R G5 R E5 R D5 R C5 R E5 R', 'square', 0.08, 3500),
    ];

    // Bass pattern (8 steps, 2 bars)
    const bassPattern = parsePattern('C3 R G3 R A3 R F3 R C3 R G3 R A3 R', 'triangle', 0.1, 600);

    // Arpeggio pattern for brightness
    const arpeggioPattern = parsePattern('C5 R E5 R G5 R E5 R C5 R D5 R F5 R A5 R F5 R', 'square', 0.03, 4000);

    // Hi-hat on beats
    const hihatPattern = parsePattern('R 8000 R R R 8000 R R R 8000 R 8000 R R', 'sine', 0.03, 8000);

    // Sequencer state
    let bgmTimerId = null;
    let bgmStep = 0;
    let bgmPhrase = 0;
    const BPM = 130;
    const STEP_TIME = 60000 / BPM / 2; // 8th notes

    function startBGM() {
      stopBGM();
      const ctx = audioManager.getCtx();
      const dest = audioManager.getBgmNode();

      const playStep = () => {
        const now = ctx.currentTime;
        const phraseLen = melodies[0].length; // 16 steps
        const melodyStep = bgmStep % phraseLen;

        // Change phrase every 16 steps (about 3.7 seconds)
        if (melodyStep === 0 && bgmStep > 0) {
          bgmPhrase = (bgmPhrase + 1) % melodies.length;
        }

        // Melody
        const note = melodies[bgmPhrase][melodyStep];
        if (note.freq > 0) {
          const osc = ctx.createOscillator();
          osc.type = note.type;
          osc.frequency.value = note.freq;
          const g = ctx.createGain();
          g.gain.setValueAtTime(note.gain, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          const f = ctx.createBiquadFilter();
          f.type = 'lowpass';
          f.frequency.value = note.lpf;
          osc.connect(f).connect(g).connect(dest);
          osc.start(now);
          osc.stop(now + 0.15);
        }

        // Bass
        const bassNote = bassPattern[bgmStep % bassPattern.length];
        if (bassNote.freq > 0) {
          const osc = ctx.createOscillator();
          osc.type = bassNote.type;
          osc.frequency.value = bassNote.freq;
          const g = ctx.createGain();
          g.gain.setValueAtTime(bassNote.gain, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          osc.connect(g).connect(dest);
          osc.start(now);
          osc.stop(now + 0.2);
        }

        // Arpeggio
        const arpNote = arpeggioPattern[bgmStep % arpeggioPattern.length];
        if (arpNote.freq > 0) {
          const osc = ctx.createOscillator();
          osc.type = arpNote.type;
          osc.frequency.value = arpNote.freq;
          const g = ctx.createGain();
          g.gain.setValueAtTime(arpNote.gain, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          const f = ctx.createBiquadFilter();
          f.type = 'lowpass';
          f.frequency.value = arpNote.lpf;
          osc.connect(f).connect(g).connect(dest);
          osc.start(now);
          osc.stop(now + 0.08);
        }

        // Hi-hat
        const hihat = hihatPattern[bgmStep % hihatPattern.length];
        if (hihat.freq > 0) {
          const bufSize = ctx.sampleRate * 0.02;
          const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
          const noise = ctx.createBufferSource();
          noise.buffer = buf;
          const g = ctx.createGain();
          g.gain.setValueAtTime(0.035, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.02);
          const f = ctx.createBiquadFilter();
          f.type = 'highpass';
          f.frequency.value = 8000;
          noise.connect(f).connect(g).connect(dest);
          noise.start(now);
        }

        bgmStep++;
        bgmTimerId = setTimeout(playStep, STEP_TIME);
      };
      playStep();
    }

    function stopBGM() {
      if (bgmTimerId) {

    // ===== CONSTANTS =====

    // ===== CANDY BACKGROUND ANIMATION =====
    (function initCandyBackground() {

      const PASTEL_COLORS = [

      // Create candy shapes

      function createCandy() {
        return {
          x: Math.random() * bgCanvas.width,
          y: Math.random() * bgCanvas.height,
          size: 20 + Math.random() * 60,
          color: PASTEL_COLORS[Math.floor(Math.random() * PASTEL_COLORS.length)],

      }

      function drawWrappedCandy(x, y, size, color, rotation) {
        const cx = x;
        const cy = y;
        bgCtx.save();
        bgCtx.translate(cx, cy);
        bgCtx.rotate(rotation);
        bgCtx.globalAlpha = bgCtx.globalAlpha;

        // Wrapper body
        const bodyW = size * 0.5;
        const bodyH = size * 0.35;
        const bodyGrad = bgCtx.createRadialGradient(-bodyW * 0.2, -bodyH * 0.2, 0, 0, 0, bodyW * 0.7);
        bodyGrad.addColorStop(0, lightenColor(color, 40));
        bodyGrad.addColorStop(0.5, color);
        bodyGrad.addColorStop(1, darkenColor(color, 20));
        bgCtx.fillStyle = bodyGrad;

        // Rounded body
        bgCtx.beginPath();
        bgCtx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI * 2);
        bgCtx.fill();

        // Twisted ends
        bgCtx.fillStyle = darkenColor(color, 15);
        bgCtx.beginPath();
        bgCtx.moveTo(-bodyW, 0);
        bgCtx.lineTo(-bodyW - size * 0.25, -size * 0.12);
        bgCtx.lineTo(-bodyW - size * 0.25, size * 0.12);
        bgCtx.closePath();
        bgCtx.fill();

        bgCtx.beginPath();
        bgCtx.moveTo(bodyW, 0);
        bgCtx.lineTo(bodyW + size * 0.25, -size * 0.12);
        bgCtx.lineTo(bodyW + size * 0.25, size * 0.12);
        bgCtx.closePath();
        bgCtx.fill();

        bgCtx.restore();
      }

      function lightenColor(hex, percent) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.min(255, (num >> 16) + Math.floor(255 * percent / 100));
        const g = Math.min(255, ((num >> 8) & 0xff) + Math.floor(255 * percent / 100));
        const b = Math.min(255, (num & 0xff) + Math.floor(255 * percent / 100));
        return `rgb(${r},${g},${b})`;
      }

      function darkenColor(hex, percent) {
        const num = parseInt(hex.slice(1), 16);
        const r = Math.max(0, (num >> 16) - Math.floor(255 * percent / 100));
        const g = Math.max(0, ((num >> 8) & 0xff) - Math.floor(255 * percent / 100));
        const b = Math.max(0, (num & 0xff) - Math.floor(255 * percent / 100));
        return `rgb(${r},${g},${b})`;
      }

      function drawStar(x, y, size, color, rotation) {
        bgCtx.save();
        bgCtx.translate(x, y);
        bgCtx.rotate(rotation);
        bgCtx.globalAlpha = bgCtx.globalAlpha;
        bgCtx.fillStyle = color;
        bgCtx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const r = i === 0 ? size : size;
          if (i === 0) bgCtx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
          else bgCtx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
          const innerAngle = angle + (2 * Math.PI) / 10;
          bgCtx.lineTo(Math.cos(innerAngle) * size * 0.4, Math.sin(innerAngle) * size * 0.4);
        }
        bgCtx.closePath();
        bgCtx.fill();
        bgCtx.restore();
      }

      function drawCircle(x, y, size, color, rotation) {
        bgCtx.save();
        bgCtx.translate(x, y);
        bgCtx.rotate(rotation);
        bgCtx.globalAlpha = bgCtx.globalAlpha;
        const grad = bgCtx.createRadialGradient(-size * 0.15, -size * 0.15, 0, 0, 0, size * 0.6);
        grad.addColorStop(0, lightenColor(color, 50));
        grad.addColorStop(0.5, color);
        grad.addColorStop(1, darkenColor(color, 15));
        bgCtx.fillStyle = grad;
        bgCtx.beginPath();
        bgCtx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
        bgCtx.fill();
        bgCtx.restore();
      }

      function animate() {
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

        candies.forEach(c => {
          // Update position (diagonal drift)
          c.x += c.vx;
          c.y += c.vy;
          c.rotation += c.rotSpeed;

          // Wrap around edges diagonally
          if (c.x > bgCanvas.width + c.size) c.x = -c.size;
          if (c.y > bgCanvas.height + c.size) c.y = -c.size;

          // Pulsing alpha
          const pulseAlpha = c.alpha + Math.sin(Date.now() * 0.002 + c.phase) * 0.05;
          bgCtx.globalAlpha = Math.max(0.08, Math.min(0.45, pulseAlpha));

          // Draw candy shape
          if (c.type === 0) {
            drawCircle(c.x, c.y, c.size, c.color, c.rotation);
          } else if (c.type === 1) {
            drawWrappedCandy(c.x, c.y, c.size, c.color, c.rotation);
          } else {
            drawStar(c.x, c.y, c.size, c.color, c.rotation);
          }
        });

        requestAnimationFrame(animate);
      }

      animate();
    })();

    let board = [];

    function createPuyo() {

        x: 3, // 右から3列目（col 3）

          COLORS[Math.floor(Math.random() * COLORS.length)],

    function getSatellitePos(puyo) {
      const [ox, oy] = ROT_OFFSETS[puyo.rot];
      return { x: puyo.x + ox, y: puyo.y + oy };
    }

    function canPlaceCell(x, y) {
      if (x < 0 || x >= COLS) return false;
      if (y >= ROWS) return false;
      if (y < 0) return true; // Above visible area is always passable (falling from above)
      return board[y][x] === null;
    }

    function canPlacePuyo(x, y, rot) {
      if (!canPlaceCell(x, y)) return false;
      const [ox, oy] = ROT_OFFSETS[rot];

    }

    // For rotation - only main block collision matters, satellite can pass through
    function canPlacePuyoForRotation(x, y, rot) {
      if (!canPlaceCell(x, y)) return false;
      // Satellite block can overlap during rotation - don't check it
      return true;
    }

    // Check satellite collision during rotation and return push direction (dx, dy) to avoid overlap
    // Returns null if no collision, or { dx, dy, valid } where valid means the push would actually work
    function getSatelliteCollisionPush(x, y, rot) {
      const [ox, oy] = ROT_OFFSETS[rot];
      const sx = x + ox;
      const sy = y + oy;
      // Check if satellite would be in a blocked cell
      if (sx >= 0 && sx < COLS && sy >= 0 && sy < ROWS) {
        if (board[sy][sx] !== null) {
          // Satellite would collide - determine push direction
          // Push away from the obstacle (toward main block)
          let pushX = 0, pushY = 0;
          if (ox !== 0) pushX = -Math.sign(ox); // Push opposite to satellite offset
          if (oy !== 0) pushY = -Math.sign(oy); // Push opposite to satellite offset
          // If push direction is zero (edge case), use perpendicular push
          if (pushX === 0 && pushY === 0) {
            // For vertical satellite (ox=0), push horizontally
            pushX = (oy > 0) ? -1 : 1;
          }
          // Check if pushed position is valid for main block AND satellite doesn't collide there
          const pushedSX = x + pushX + ox;
          const pushedSY = y + pushY + oy;
          const mainValid = canPlaceCell(x + pushX, y + pushY);
          const satValid = (pushedSX < 0 || pushedSX >= COLS || pushedSY < 0 || pushedSY >= ROWS || board[pushedSY][pushedSX] === null);
          if (mainValid && satValid) {
            return { dx: pushX, dy: pushY };
          }
          // Try alternative push directions
          const alternatives = [];
          if (pushX !== 0) alternatives.push({ dx: 0, dy: pushY || 1 }, { dx: 0, dy: pushY || -1 });
          if (pushY !== 0) alternatives.push({ dx: pushX || 1, dy: 0 }, { dx: pushX || -1, dy: 0 });
          for (const alt of alternatives) {
            const altSX = x + alt.dx + ox;
            const altSY = y + alt.dy + oy;
            const altMainValid = canPlaceCell(x + alt.dx, y + alt.dy);
            const altSatValid = (altSX < 0 || altSX >= COLS || altSY < 0 || altSY >= ROWS || board[altSY][altSX] === null);
            if (altMainValid && altSatValid) {
              return alt;
            }
          }
        }
      }
      return null; // No collision or push not possible
    }

    // Check if rotation would leave satellite embedded and uncorrectable
    function canRotateWithCorrection(x, y, rot) {
      const [ox, oy] = ROT_OFFSETS[rot];
      const spX = x + ox;
      const spY = y + oy;

      // Check if satellite would be inside a block
      if (spX >= 0 && spX < COLS && spY >= 0 && spY < ROWS) {
        if (board[spY][spX] !== null) {
          // Satellite would be embedded - check if we can correct it

          // Special case: if satellite is below main (oy > 0) and there's space below main,
          // allow rotation - this enables "position swap" rotation
          if (oy > 0 && canPlaceCell(x, y + 1)) {
            return true; // Space below main block - allow rotation
          }

          let pushX = 0, pushY = 0;
          if (ox !== 0) pushX = -Math.sign(ox);
          if (oy !== 0) pushY = -Math.sign(oy);
          if (pushX === 0 && pushY === 0) pushX = 1;

          const attempts = [
            { dx: pushX, dy: pushY },
            { dx: pushX, dy: 0 },
            { dx: 0, dy: pushY },
            { dx: -pushX, dy: pushY },
            { dx: pushX, dy: -pushY },
            { dx: 0, dy: 1 },
            { dx: 0, dy: -pushY },
            { dx: 1, dy: 0 },
            { dx: -1, dy: 0 },
          ];

          for (const attempt of attempts) {
            const newX = x + attempt.dx;
            const newY = y + attempt.dy;
            const newSp = { x: newX + ox, y: newY + oy };

            if (!canPlaceCell(newX, newY)) continue;
            if (newSp.x >= 0 && newSp.x < COLS && newSp.y >= 0 && newSp.y < ROWS) {
              if (board[newSp.y][newSp.x] !== null) continue;
            }
            // Correction possible
            return true;
          }
          // No correction possible - rotation would leave satellite embedded
          return false;
        }
      }
      return true; // No collision
    }

    function canSpawnPuyo(x, y, rot) {
      // Stricter check for initial spawn position
      if (!canPlaceCell(x, y)) return false;
      const [ox, oy] = ROT_OFFSETS[rot];
      if (!canPlaceCell(x + ox, y + oy)) return false;
      return true;
    }

    function spawn() {
      current = nextPuyo || createPuyo();
      nextPuyo = createPuyo();

      drawNext();

      const spawnCol = 3; // 右から3列目

      // Check if spawn column top cell (row 0) is blocked - need to spawn from side
      const topCellBlocked = board[0]?.[spawnCol] !== null;

      if (!canSpawnPuyo(current.x, current.y, current.rot) || topCellBlocked) {
        // Find nearest column to spawnCol with empty row 0 cell
        let bestX = -1;
        let bestDist = Infinity;

        for (let x = 0; x < COLS; x++) {
          if (x === spawnCol) continue; // Skip original spawn column
          if (board[0]?.[x] === null) {
            const dist = Math.abs(x - spawnCol);
            if (dist < bestDist) {
              bestDist = dist;
              bestX = x;
            }
          }

        if (bestX >= 0) {
          current.x = bestX;

          if (restartBtn) restartBtn.style.display = 'block';
          const titleBtn = document.getElementById('title-btn');

        }
      }
    }

    function placePuyo(puyo) {
      const x = Math.round(puyo.x);
      const y = Math.floor(puyo.y);
      const sp = getSatellitePos({ x, y, rot: puyo.rot });

      // Place on board
      if (y >= 0 && y < ROWS && x >= 0 && x < COLS) board[y][x] = puyo.colors[0];
      if (sp.y >= 0 && sp.y < ROWS && sp.x >= 0 && sp.x < COLS) board[sp.y][sp.x] = puyo.colors[1];
      landSfx();

      // Game over check: if ALL columns in row 0 are filled (一段目が埋まったら)
      let row0Filled = true;
      for (let cx = 0; cx < COLS; cx++) {

        const titleBtn = document.getElementById('title-btn');
